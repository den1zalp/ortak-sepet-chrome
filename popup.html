<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <title>Ortak Sepet</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="app">
      <header class="header">
        <div>
          <h1>Ortak Sepet</h1>
          <p id="appSubtitle"></p>
        </div>

        <div class="header-controls">
          <label class="language-control">
            <span id="languageLabel"></span>
            <select id="languageSelect" aria-label="Dil seçimi">
              <option value="tr">TR</option>
              <option value="en">EN</option>
            </select>
          </label>

          <button id="themeToggleBtn" class="theme-toggle" type="button" aria-label="Tema değiştir">
            <span class="theme-track">
              <span class="theme-half theme-half-light" aria-hidden="true">
                <span class="theme-sky-cloud theme-cloud-one"></span>
                <span class="theme-sky-cloud theme-cloud-two"></span>
              </span>
              <span class="theme-half theme-half-dark" aria-hidden="true">
                <span class="theme-stars"></span>
              </span>
            </span>
            <span class="theme-thumb" aria-hidden="true">
              <span class="theme-thumb-sun"></span>
              <span class="theme-thumb-moon"></span>
            </span>
          </button>
        </div>
      </header>

      <button id="addCurrentProductBtn" class="primary-button"></button>

      <button
        id="categorizeProductsBtn"
        class="secondary-button compact-button"
      ></button>

      <button
        id="installmentProductsBtn"
        class="secondary-button compact-button"
      ></button>

      <button id="updateAllPricesBtn" class="secondary-button compact-button"></button>

      <button id="exportCsvBtn" class="secondary-button compact-button"></button>

      <section class="view-controls" aria-label="Görünüm ayarları">
        <button id="compactViewBtn" class="view-control-button" type="button"></button>
        <button id="countryGroupingBtn" class="view-control-button" type="button"></button>
      </section>

      <p id="status" class="status"></p>

      <section class="summary">
        <div>
          <span id="itemCountLabel" class="summary-label"></span>
          <strong id="itemCount">0</strong>
        </div>

        <div>
          <span id="totalPriceLabel" class="summary-label"></span>
          <strong id="totalPrice">0,00 TL</strong>
        </div>

        <div>
          <span id="selectedTotalPriceLabel" class="summary-label"></span>
          <strong id="selectedTotalPrice">0,00 TL</strong>
        </div>
      </section>

      <section class="cart-section">
        <h2 id="cartTitle"></h2>
        <div id="cartItems"></div>
      </section>

      <button id="clearCartBtn" class="secondary-button"></button>
    </main>

    <script src="browser-polyfill.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
